<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />

        <!-- 🌐 Title -->
        <title>Gestion des vendeurs — Inventaire</title>

        <!-- 🎨 Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <!-- 📊 DataTables CSS -->
        <link
            rel="stylesheet"
            href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css"
        />

        <!-- 📎 Buttons CSS -->
        <link
            rel="stylesheet"
            href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css"
        />

        <!-- 🎭 Icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
        />

        <!-- 📌 jQuery (يجب وضعه قبل DataTables) -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

        <!-- 📊 DataTables JS -->
        <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

        <!-- ⬇️ Buttons JS -->
        <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
        <!-- زر الطباعة -->
        <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>
        <!-- code css nav bar  -->
        <link rel="stylesheet" href="/css/navb.css" />
        <style>
            body {
                background: #f8f9fa;
                text-align: center;
            }
            .password-box {
                letter-spacing: 3px;
                font-weight: bold;
            }
            table {
                font-size: 22px;
                font-weight: 600;
                letter-spacing: 1px;
            }
            #topLoad {
                display: flex;
                justify-content: center;
                align-items: center;
                inset: 0; /* يغطي كامل الصفحة */
                background-image: linear-gradient(
                    -60deg,
                    #ff5858 0%,
                    #f09819 100%
                );
                width: 100vw;
                height: 100vh;
                z-index: 9999;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
            #loading {
                /* محاذاة المحتوى في منتصف الشاشة */
                /* نص التحميل */
                font-size: 2.5rem;
                font-weight: bold;
                color: #3734cee1;
                font-weight: 700;
                text-shadow: 3px 5px 2px rgba(128, 0, 0, 0.69);
                text-align: center;
                text-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 100%;
                /* تموضع العنصر بدقة في منتصف الشاشة */
            }
            #loading i {
                font-size: 120px;
                margin-right: 30px;
                color: #41c72de1;
            }
            @media only screen and (min-width: 358px) and (max-width: 599px) {
                .card {
                    zoom: 0.6 !important;
                }
                #loading {
                    font-size: 1.5rem !important;
                }
                #loading i {
                    font-size: 80px !important;
                }
            }
            @media only screen and (min-width: 600px) and (max-width: 1019px) {
                .card {
                    zoom: 0.6 !important;
                }
                #loading {
                    font-size: 2.2rem !important;
                }
                #loading i {
                    font-size: 100px !important;
                }
            }
            @media only screen and (min-width: 1020px) {
                .card {
                    zoom: 1 !important;
                }
                #loading {
                    font-size: 3rem !important;
                }
                #loading i {
                    font-size: 120px !important;
                }
            }
        </style>
    </head>
    <body class="bg-light">
        <div id="topLoad">
            <div id="loading">
                <i class="bi bi-battery-charging"></i> Chargement des données...
            </div>
        </div>
        <!-- خلفية تغطي الشاشة -->
        <div
            id="passwordOverlay"
            style="
                position: fixed;
                inset: 0;
                background: rgb(128, 120, 120);
                display: none;
                justify-content: center;
                align-items: center;
                z-index: 999999999999;
            "
        >
            <div
                style="
                    background: white;
                    padding: 25px;
                    border-radius: 10px;
                    width: 80%;
                    margin: 0 auto;
                    text-align: center;
                    box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
                "
            >
                <h3>🔐 Accès protégé</h3>
                <p>Veuillez entrer le mot de passe :</p>
                <input
                    id="passwordInput"
                    type="password"
                    style="
                        width: 100%;
                        padding: 10px;
                        margin: 10px 0;
                        border-radius: 8px;
                        border: 1px solid #aaa;
                    "
                />
                <button
                    onclick="submitPassword()"
                    style="
                        padding: 10px;
                        width: 100%;
                        background: #007bff;
                        color: white;
                        border: none;
                        border-radius: 8px;
                        cursor: pointer;
                    "
                >
                    Entrer
                </button>

                <p id="errorMsg" style="color: red; margin-top: 10px"></p>
            </div>
        </div>
        <div class="card p-4 shadow-sm mt-4">
            <h4 class="mb-3 text-primary">
                <i class="fa-brands fa-invision text-danger"></i>
                Détails des vendeurs — Name / Status
            </h4>

            <!-- 🔍 Champ de recherche -->
            <div class="mb-3">
                <input
                    type="text"
                    id="searchVendeur"
                    class="form-control"
                    placeholder="Rechercher un vendeur..."
                />
            </div>

            <div class="table-responsive">
                <table
                    id="sharedTableType"
                    class="table table-striped table-bordered mt-3"
                    style="width: 100%"
                >
                    <thead class="table-dark">
                        <tr>
                            <th>Nom du vendeur</th>
                            <th>Nombre des produits</th>
                            <th>Statut</th>
                            <th>Dernière connexion</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="containeer">
            <div class="menu-toggle">
                <span class="fa fa-plus"></span>
            </div>
            <div class="menu-round">
                <div class="btn-app" data-label="Data Vendeurs">
                    <div class="fa">
                        <a href="/listVendeurs"
                            ><i
                                class="fa-solid fa-circle-left"
                                style="color: white"
                            ></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <script src="js/main2.js"></script>
        <script src="js/pageUser.js"></script>
    </body>
</html>
