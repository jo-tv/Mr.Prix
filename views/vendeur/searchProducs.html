<!doctype html>
<html lang="ar">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>بحث المنتجات</title>
        <link rel="stylesheet" href="/css/navb.css" />
        <link rel="stylesheet" href="/css/searchProducs.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <img class="backendImg" src="img/back.png" />
        <div class="search-box">
            <div style="position: relative">
                <input
                    id="searchInput"
                    type="text"
                    placeholder="اكتب رقم المرجع أو اسم المنتج..."
                />

                <!-- زر لصق -->
                <button id="pasteBtn" class="paste-btn">📋</button>
            </div>
            <div id="alertContainer"></div>
            <div class="results" id="results"></div>
            <div class="pagination" id="pagination"></div>
        </div>

        <!-- تكبير الصورة -->
        <div id="imageOverlay">
            <button id="closeOverlay">إغلاق</button>
            <img id="overlayImg" src="" alt="تكبير الصورة" />
        </div>

        <!-- زر الرجوع -->
        <div class="containeer">
            <div class="menu-toggle">
                <span class="fa fa-plus"></span>
            </div>
            <div class="menu-round">
                <div class="btn-app return" data-label="Reteur ">
                    <a href="#"></a>
                    <div class="fa">
                        <a href="#"
                            ><i
                                class="fas fa-sign-out-alt"
                                style="color: white"
                            ></i
                        ></a>
                    </div>
                </div>
            </div>
            <div class="menu-line"></div>
        </div>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="js/searchProducs.js"></script>
    </body>
</html>
