<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=.8" />
        <title>Price Tag A6 - Optimized</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />
        <!-- code css nav bar  -->
        <link rel="stylesheet" href="/css/navb.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <!-- 🎭 Icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

        <style>
            @import url("https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap");
            /* التنسيقات (بقيت كما هي مع تعديلات طفيفة للطباعة) */
            @page {
                size: 105mm 148mm;
                margin: 0;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                background: #fff;
                padding: 20px;
                font-family: "Ubuntu", sans-serif;
                margin: 0;
            }
            .actions {
                background: #333;
                width: 100%;
                height: 70px;
                display: flex;
                justify-content: space-around;
                align-items: center;
                gap: 7px;
                position: fixed;
                top: 0;
                z-index: 9999;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            }
            .actions .btn-action {
                padding: 8px;
                border: none;
                color: #fff;
                font-weight: bold;
                border-radius: 5px;
                cursor: pointer;
                font-size: 12px !important  ;
                width: 100%;
                height: 50px;
                overflow: hidden;
                display: flex;
                justify-content: space-around;
                align-items: center;
            }
            .actions .btn-action i {
                font-size: 14px;
                font-weight: 900;
            }
            .card {
                width: 105mm;
                height: 148mm;
                background: #fff;
                position: relative;
                overflow: hidden;
                margin-top: 100px;
                border: 1px solid #59545474;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                flex-shrink: 0;
            }
            .title {
                position: absolute;
                top: 6mm;
                left: 6mm;
                right: 6mm;
                font-weight: 800;
                font-size: 17pt;
                color: #000;
                height: 100px;
                overflow: hidden;
                line-height: 2rem;
                letter-spacing: 1px;
                width: 90%;
            }
            .arc {
                position: absolute;
                left: 0;
                right: 0;
                top: 3mm;
                z-index: 1;
                display: block;
            }
            .promo-box {
                width: 80%;
                display: flex;
                justify-content: space-around;
                align-items: center;
                position: absolute;
                left: 0;
                right: 0;
                top: 48mm;
                z-index: 1;
                margin: 0 auto;
                display: none;
            }
            .promo-title {
                font-size: 1.7rem;
                font-weight: bold;
                margin-bottom: 25px;
                text-align: center;
                margin: 0;
                padding: 0;
            }
            .promo-content {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 1.5rem;
                font-weight: bold;
                margin: 0;
                padding: 0;
            }
            .old-price {
                text-decoration: line-through;
                font-size: 2rem;
            }
            .porcent {
                width: 130px;
                text-align: right;
                color: #a82d29;
            }
            
            .price {
                position: relative;
                right: 25px;
                text-align: center;
                font-weight: 700;
                letter-spacing: 3px;
                color: #a82d29;
                z-index: 2;
            }
            .price .amount {
                font-size: 115px;
            }
            .price .unit {
                position: absolute;
                font-size: 25pt;
                vertical-align: top;
                padding: 10px;
                margin-top: 28px;
            }
            .price #cente {
                position: absolute;
                bottom: 0;
                margin-bottom: 20px;
                font-size: 30pt;
                vertical-align: bottom;
            }
            .small-box {
                position: absolute;
                left: 6mm;
                bottom: 12mm;
                width: 35mm;
                height: 30mm;
                border: 1px solid #6e5f52;
            }
            .dateValable {
                position: relative;
                right: 35mm;
                bottom: 0;
                font-size: 8pt;
                font-weight: 900;
                width: 320px;
                padding: 20px;
                display: flex;
                flex-direction: column;
                display: none;
                letter-spacing: 2px;
            }
            .dateValable span,
            .dateValable div {
                margin-top: 5px;
                text-align: right;
            }
            .meta {
                position: absolute;
                right: -25mm;
                bottom: 0mm;
                font-size: 9pt;
                font-weight: 900;
                width: 320px;
                padding: 20px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: start;
                letter-spacing: 1px;
            }
            .meta input {
                border: none;
                padding: 2px;
                width: 120px;
                font-size: 8pt;
                font-weight: 900;
                outline: none;
                letter-spacing: 1px;
            }
            .date {
                position: absolute;
                bottom: 5mm;
                left: 6mm;
                font-size: 8pt;
                color: #999;
            }
            .remove-btn {
                position: absolute;
                top: 5px;
                right: 5px;
                background: red;
                color: white;
                border-radius: 50%;
                width: 35px;
                height: 35px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1rem;
                font-weight: 700;
                z-index: 10;
            }
            .container-scan {
                width: 100%;
                height: 200px;
                z-index: -9999999;
                position: fixed;
                top: 40%;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #reader {
                width: 90vw;
                max-width: 320px;
                background: black;
                border-radius: 16px;
                overflow: hidden;
                display: none;
                z-index: 1000011;
                box-shadow:
                    rgba(0, 0, 0, 0.4) 0px 30px 60px,
                    rgba(0, 0, 0, 0.3) 0px 15px 30px;
            }
            /* زر الإغلاق */
            .fermer {
                position: fixed;
                top: 10%;
                width: 66px;
                height: 66px;
                border-radius: 50%;
                background: red;
                color: white;
                font-size: 38px;
                font-weight: bold;
                border: none;
                outline: none;
                display: none;
                z-index: 10001;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            }
            /* === BASE HEADING === */

            h1 {
                position: relative;
                padding: 0;
                margin: 0;
                font-family: "Raleway", sans-serif;
                font-weight: 300;
                font-size: 40px;
                color: #080808;
                -webkit-transition: all 0.4s ease 0s;
                -o-transition: all 0.4s ease 0s;
                transition: all 0.4s ease 0s;
            }

            h1 span {
                display: block;
                font-size: 0.5em;
                line-height: 1.3;
            }
            h1 em {
                font-style: normal;
                font-weight: 600;
            }

            /* === HEADING STYLE #1 === */
            .one {
                position: relative;
                top: 100px;
                margin-bottom: 50px;
                border: 1px solid #000;
                padding: 50px;
                box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
            }
            .one h1 {
                text-align: center;
                padding-bottom: 5px;
                font-weight: 900;
            }
            .one h1:before {
                width: 28px;
                height: 5px;
                display: block;
                content: "";
                position: absolute;
                bottom: 3px;
                left: 50%;
                margin-left: -14px;
                background-color: #b80000;
            }
            .one h1:after {
                width: 100px;
                height: 1px;
                display: block;
                content: "";
                position: relative;
                margin-top: 25px;
                left: 50%;
                margin-left: -50px;
                background-color: #b80000;
            }
        </style>
    </head>

    <body>
        <div class="actions">
            <button
                class="btn-action"
                id="addCardBtn"
                style="background: #4a90e2"
            >
                <i class="bi bi-plus-circle"></i> Ajouter Affiche
            </button>
            <button
                id="downloadAll"
                class="btn-action"
                style="background: #e74c3c"
            >
                <i class="bi bi-file-earmark-pdf-fill"></i> Télécharger PDF</button
            ><button
                class="btn-action"
                id="clearStorage"
                style="background: #777"
            >
                <i class="bi bi-trash"></i> Effacer la mémoire
            </button>
            <button class="btn-action" id="scaner" style="background: #8e63d2">
                <i class="bi bi-upc-scan"></i> scan Code-Barre
            </button>
        </div>
        <div class="container-scan">
            <button class="fermer">X</button>
            <div id="reader"></div>
        </div>
        <div class="one">
            <h1>Page affiche A6</h1>
        </div>
        <div id="cardsContainer"></div>
        <div class="containeer" id="smoll">
            <div class="menu-toggle">
                <span class="fa fa-plus"></span>
            </div>
            <div class="menu-round">
                <div class="btn-app" data-label="affiche A5">
                    <div class="fa">
                        <a href="afficheA5"
                            ><i class="fa-solid fa-a" style="color: white"
                                ><span style="font-size: 12px">5</span></i
                            ></a
                        >
                    </div>
                </div>
                <div class="btn-app" data-label="affiche A4">
                    <a href="afficheA4"></a>
                    <div class="fa">
                        <a href="afficheA4"
                            ><i class="fa-solid fa-a" style="color: white"
                                ><span style="font-size: 12px">4</span></i
                            ></a
                        >
                    </div>
                </div>
                <div class="btn-app" data-label="Lecteur Prix">
                    <div class="fa">
                        <a href="/prixVen"
                            ><i
                                class="fa-solid fa-circle-left"
                                style="color: white"
                            ></i>
                        </a>
                    </div>
                </div>
            </div>
            <div class="menu-line">
                <div class="btn-app" data-label="affiche A6">
                    <a href="afficheA6"></a>
                    <div class="fa">
                        <a href="afficheA6"
                            ><i class="fa-solid fa-a" style="color: white"
                                ><span style="font-size: 12px">6</span></i
                            ></a
                        >
                    </div>
                </div>
                <div class="btn-app" data-label="affiche A7">
                    <a href="afficheA7"></a>
                    <div class="fa">
                        <a href="afficheA7"
                            ><i class="fa-solid fa-a" style="color: white"
                                ><span style="font-size: 12px">7</span></i
                            ></a
                        >
                    </div>
                </div>
            </div>
        </div>
        <script src="js/codebar.min.js"></script>
        <script src="js/afficheA6.js"></script>
    </body>
</html>
