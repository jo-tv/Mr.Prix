<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Price Tag A5 - Optimized</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <!-- 🎭 Icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        />
        <!-- code css nav bar  -->
        <link rel="stylesheet" href="/css/navb.css" />
        <link rel="stylesheet" href="/css/Affiche/afficheA5.css" />
    </head>

    <body>
        <div class="actions">
            <button
                class="btn-action"
                id="addCardBtn"
                style="background: #4a90e2"
            >
                <i class="bi bi-plus-circle"></i> Ajouter Affiche
            </button>
            <button
                id="downloadAll"
                class="btn-action"
                style="background: #e74c3c"
            >
                <i class="bi bi-file-earmark-pdf-fill"></i> Télécharger PDF</button
            ><button
                class="btn-action"
                id="clearStorage"
                style="background: #777"
            >
                <i class="bi bi-trash"></i> Effacer la mémoire
            </button>
            <button class="btn-action" id="scaner" style="background: #8e63d2">
                <i class="bi bi-upc-scan"></i> scan Code-Barre
            </button>
        </div>
        <div class="container-scan">
            <button class="fermer">X</button>
            <div id="reader"></div>
        </div>
        <div class="one">
            <h1>Page affiche A5</h1>
        </div>
        <!-- From Uiverse.io by Yaya12085 -->
        <div class="cardss">
            <div class="header">
                <span class="icon">
                    <svg
                        fill="currentColor"
                        viewBox="0 0 20 20"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <path
                            clip-rule="evenodd"
                            d="M18 3a1 1 0 00-1.447-.894L8.763 6H5a3 3 0 000 6h.28l1.771 5.316A1 1 0 008 18h1a1 1 0 001-1v-4.382l6.553 3.276A1 1 0 0018 15V3z"
                            fill-rule="evenodd"
                        ></path>
                    </svg>
                </span>
                <p class="alert">New message!</p>
            </div>

            <p class="message">🛍️ لم يتم العثور على المنتج</p>

            <div class="action">
                <a class="read" href=""> حسنا </a>
            </div>
        </div>
        <div id="cardsContainer"></div>
        <div class="containeer">
            <div class="menu-toggle">
                <span class="fa fa-plus"></span>
            </div>
            <div class="menu-round">
                <div class="btn-app" data-label="Lecteur Prix">
                    <div class="fa">
                        <a href="/prixVen"
                            ><i
                                class="fa-solid fa-circle-left"
                                style="color: white"
                            ></i>
                        </a>
                    </div>
                </div>
            </div>
            <div class="menu-line">
                <div class="btn-app" data-label="affiche A4">
                    <a href="afficheA4"></a>
                    <div class="fa">
                        <a href="afficheA4"
                            ><i class="fa-solid fa-a" style="color: white"
                                ><span style="font-size: 12px">4</span></i
                            ></a
                        >
                    </div>
                </div>
                <div class="btn-app" data-label="affiche A5">
                    <div class="fa">
                        <a href="afficheA5"
                            ><i class="fa-solid fa-a" style="color: white"
                                ><span style="font-size: 12px">5</span></i
                            ></a
                        >
                    </div>
                </div>
                <div class="btn-app" data-label="affiche A6">
                    <a href="afficheA6"></a>
                    <div class="fa">
                        <a href="afficheA6"
                            ><i class="fa-solid fa-a" style="color: white"
                                ><span style="font-size: 12px">6</span></i
                            ></a
                        >
                    </div>
                </div>
                <div class="btn-app" data-label="affiche A7">
                    <a href="afficheA7"></a>
                    <div class="fa">
                        <a href="afficheA7"
                            ><i class="fa-solid fa-a" style="color: white"
                                ><span style="font-size: 12px">7</span></i
                            ></a
                        >
                    </div>
                </div>
                <div class="btn-app" data-label="Balisage ">
                    <a href="balisage"></a>
                    <div class="fa">
                        <a href="balisage"
                            ><i class="fa-solid fa-b" style="color: white"
                                ><span style="font-size: 12px">S</span></i
                            ></a
                        >
                    </div>
                </div>
            </div>
        </div>
        <div id="loaderOverlay">
            <div id="loaderOverlay2">
                <div id="loaderOverlay3">جاري إنشاء الملف...</div>

                <div id="loaderOverlay4">
                    <div id="progressBar"></div>
                </div>

                <div id="progressText">0%</div>
            </div>
        </div>
        <div id="cart-indicator">
            <button type="button">
                <span class="item-count">0</span>
            </button>
        </div>
        <script src="js/codebar.min.js"></script>
        <script src="js/canva.js"></script>
        <script src="js/Affiche/afficheA5.js"></script>
    </body>
</html>
