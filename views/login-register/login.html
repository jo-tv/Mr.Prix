<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Login page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="./css/LoginStyle/login.css" />
    </head>

    <body>
        <div class="tile">
            <div class="tile-header">
                <h2
                    style="
                        color: white;
                        opacity: 0.75;
                        font-size: 4rem;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        height: 100%;
                    "
                ></h2>
            </div>

            <div class="tile-body">
                <form class="form" id="loginForm" method="POST">
                    <label class="form-input">
                        <i class="material-icons">username</i>
                        <input type="text" name="username" required />
                        <span class="label">Username</span>
                        <span class="underline"></span>
                    </label>

                    <label class="form-input">
                        <i class="material-icons">lock</i>
                        <input type="password" name="password" required />
                        <span class="label">Password</span>
                        <div class="underline"></div>
                    </label>

                    <div
                        class="submit-container clearfix"
                        style="margin-top: 2rem"
                    >
                        <button
                            id="submit"
                            role="button"
                            type="submit"
                            class="btn btn-irenic float-right"
                            tabindex="0"
                        >
                            Se Connecter ➡️
                        </button>

                        <div class="login-pending">
                            <div class="spinner">
                                <span class="dot1"></span>
                                <span class="dot2"></span>
                            </div>

                            <div class="login-granted-content">
                                <img
                                    class="img"
                                    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSXQPznfT-VJSkkmsw5dDmshXHdsCbVfJQbtRfsxmFPbkCqJYzlgxiwXjQ&amp;s=10"
                                    alt=""
                                />
                                <i class="material-icons">done</i>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="area">
            <ul class="circles">
                <li>
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGISVbp7K6gk8_ZEosKh_tH9OIMsDp8AaRzesYOWFTHQ&amp;s=10"
                    />
                </li>
                <li>
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRMJrzA5DprCKYfqozqtWqXZgaUPIKUtZHpwrTUSYanaw&amp;s=10"
                    />
                </li>
                <li>
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQJ4ejdsksXc6Kckhx0lgDzfpl5c5aStjf-uITLXyMkvQ&amp;s=10"
                    />
                </li>
                <li>
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRMJrzA5DprCKYfqozqtWqXZgaUPIKUtZHpwrTUSYanaw&amp;s=10"
                    />
                </li>
                <li>
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRuOjc-6Asf4x8K3m4dVJpbs4MrSWwNuj2iPdUBRFisqLgH4coivk5xB-94&amp;s=10"
                    />
                </li>
                <li>
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRuOjc-6Asf4x8K3m4dVJpbs4MrSWwNuj2iPdUBRFisqLgH4coivk5xB-94&amp;s=10"
                    />
                </li>
                <li>
                    <img
                        src="https://img.freepik.com/vecteurs-premium/trouver-modele-conception-logo-produit_145155-4160.jpg"
                    />
                </li>
                <li>
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRuOjc-6Asf4x8K3m4dVJpbs4MrSWwNuj2iPdUBRFisqLgH4coivk5xB-94&amp;s=10"
                    />
                </li>
                <li>
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRuOjc-6Asf4x8K3m4dVJpbs4MrSWwNuj2iPdUBRFisqLgH4coivk5xB-94&amp;s=10"
                    />
                </li>
                <li>
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQJ4ejdsksXc6Kckhx0lgDzfpl5c5aStjf-uITLXyMkvQ&amp;s=10"
                    />
                </li>
            </ul>
        </div>
        <div class="info" dir="rtl" id="infoBox">
            <div class="info__icon">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    viewBox="0 0 24 24"
                    height="24"
                    fill="none"
                >
                    <path
                        fill="#393a37"
                        d="m12 1.5c-5.79844 0-10.5 4.70156-10.5 10.5 0 5.7984 4.70156 10.5 10.5 10.5 5.7984 0 10.5-4.7016 10.5-10.5 0-5.79844-4.7016-10.5-10.5-10.5zm.75 15.5625c0 .1031-.0844.1875-.1875.1875h-1.125c-.1031 0-.1875-.0844-.1875-.1875v-6.375c0-.1031.0844-.1875.1875-.1875h1.125c.1031 0 .1875.0844.1875.1875zm-.75-8.0625c-.2944-.00601-.5747-.12718-.7808-.3375-.206-.21032-.3215-.49305-.3215-.7875s.1155-.57718.3215-.7875c.2061-.21032.4864-.33149.7808-.3375.2944.00601.5747.12718.7808.3375.206.21032.3215.49305.3215.7875s-.1155.57718-.3215.7875c-.2061.21032-.4864.33149-.7808.3375z"
                    />
                </svg>
            </div>
            <div class="info__title" id="messageBox"></div>
            <div class="info__close" id="infoCloseBtn" style="cursor: pointer">
                <svg
                    height="20"
                    viewBox="0 0 20 20"
                    width="20"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                        d="m15.8333 5.34166-1.175-1.175-4.6583 4.65834-4.65833-4.65834-1.175 1.175 4.65833 4.65834-4.65833 4.6583 1.175 1.175 4.65833-4.6583 4.6583 4.6583 1.175-1.175-4.6583-4.6583z"
                        fill="#393a37"
                    ></path>
                </svg>
            </div>
        </div>
<div id="deviceBox" style="display:none;">
    <p id="deviceText"></p>
    <a id="whatsappBtn">إرسال</a>
</div>

        <script src="/js/Login/login.js"></script>
    </body>
</html>
